<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #ffffff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .chrome-top-bar {
            height: 52px;
            background: #f1f3f4;
            display: flex;
            align-items: center;
            padding: 0 16px;
            border-bottom: 1px solid #dcdcdc;
            position: relative;
            z-index: 100;
        }
        .mac-dots {
            display: flex;
            gap: 8px;
            margin-right: 24px;
        }
        .mac-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .mac-dot.red { background: #ff5f56; border: 1px solid #e0443e; }
        .mac-dot.yellow { background: #ffbd2e; border: 1px solid #dea123; }
        .mac-dot.green { background: #27c93f; border: 1px solid #1aab29; }
        
        .omnibox {
            flex: 1;
            max-width: 600px;
            margin: 0 auto;
            height: 34px;
            background: #ffffff;
            border-radius: 17px;
            border: 1px solid #dfe1e5;
            display: flex;
            align-items: center;
            padding: 0 16px;
            color: #5f6368;
            font-size: 14px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        
        .extensions-area {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-left: 24px;
        }
        .ext-icon {
            width: 28px;
            height: 28px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }
        .ext-icon:hover, .ext-icon.active {
            background: #e8eaed;
        }
        .ext-icon img {
            width: 20px;
            height: 20px;
        }
        
        .page-content {
            flex: 1;
            background: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 150px;
            color: #202124;
            font-family: 'Google Sans', Arial, sans-serif;
        }
        
        .google-logo {
            font-size: 80px;
            font-weight: 500;
            letter-spacing: -3px;
            margin-bottom: 30px;
            user-select: none;
        }
        .g-blue { color: #4285f4; }
        .g-red { color: #ea4335; }
        .g-yellow { color: #fbbc05; }
        .g-green { color: #34a853; }
        
        .google-search-container {
            width: 580px;
            height: 46px;
            border-radius: 24px;
            border: 1px solid #dfe1e5;
            display: flex;
            align-items: center;
            padding: 0 20px;
            margin-bottom: 30px;
            background: #fff;
            transition: box-shadow 0.2s, border-color 0.2s;
        }
        .google-search-container:hover {
            box-shadow: 0 1px 6px rgba(32,33,36,0.28);
            border-color: rgba(223,225,229,0);
        }
        
        .google-buttons {
            display: flex;
            gap: 12px;
        }
        .g-btn {
            background: #f8f9fa;
            border: 1px solid #f8f9fa;
            border-radius: 4px;
            color: #3c4043;
            font-family: arial, sans-serif;
            font-size: 14px;
            padding: 0 16px;
            height: 36px;
            cursor: pointer;
        }
        .g-btn:hover {
            background: #f1f3f4;
            border-color: #dadce0;
            color: #202124;
            box-shadow: 0 1px 1px rgba(0,0,0,.1);
        }
        
        .popup-container {
            position: absolute;
            top: 54px;
            right: 12px;
            width: 380px;
            height: 500px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.05);
            display: none;
            overflow: hidden;
            z-index: 200;
            transform-origin: top right;
            animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards;
        }
        
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
        }
        
        /* Fake cursor for recording */
        #fake-cursor {
            position: absolute;
            width: 24px;
            height: 24px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="%23000" stroke="%23fff" stroke-width="1.5" d="M7 2l11 11.2-5.8.5 3.3 7.3-2.2 1-3.2-7.4-4.4 4.5z"/></svg>') no-repeat;
            z-index: 10000;
            pointer-events: none;
            top: 50%;
            left: 50%;
            transition: top 0.4s ease, left 0.4s ease;
        }
        #fake-cursor.click {
            transform: scale(0.85);
            transition: transform 0.1s;
        }
    </style>
</head>
<body>

    <div class="chrome-top-bar">
        <div class="mac-dots">
            <div class="mac-dot red"></div>
            <div class="mac-dot yellow"></div>
            <div class="mac-dot green"></div>
        </div>
        <div class="omnibox" style="justify-content: center;">
            <span style="display: flex; align-items: center; gap: 8px;">
                <svg focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="#5f6368"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path></svg>
                Search Google or type a URL
            </span>
        </div>
        <div class="extensions-area">
            <div class="ext-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="#5f6368"><path d="M20.5 11H19V7c0-1.1-.9-2-2-2h-4V3.5C13 2.12 11.88 1 10.5 1S8 2.12 8 3.5V5H4c-1.1 0-1.99.9-1.99 2v3.8H3.5c1.49 0 2.7 1.21 2.7 2.7s-1.21 2.7-2.7 2.7H2V20c0 1.1.9 2 2 2h3.8v-1.5c0-1.49 1.21-2.7 2.7-2.7 1.49 0 2.7 1.21 2.7 2.7V22H17c1.1 0 2-.9 2-2v-4h1.5c1.38 0 2.5-1.12 2.5-2.5S21.88 11 20.5 11z"/></svg>
            </div>
            <div class="ext-icon" id="q-it-icon">
                <img src="../icons/icon-48.png" alt="Q It" />
            </div>
        </div>
    </div>
    
    <div class="page-content">
        <div class="google-logo">
            <span class="g-blue">G</span><span class="g-red">o</span><span class="g-yellow">o</span><span class="g-blue">g</span><span class="g-green">l</span><span class="g-red">e</span>
        </div>
        <div class="google-search-container">
            <svg focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="#9aa0a6" style="margin-right: 14px;"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path></svg>
        </div>
        <div class="google-buttons">
            <button class="g-btn">Google Search</button>
            <button class="g-btn">I'm Feeling Lucky</button>
        </div>
    </div>

    <div class="popup-container" id="popup-container">
        <iframe id="ext-iframe"></iframe>
    </div>

    <div id="fake-cursor"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const extId = urlParams.get('extId');
        if (extId) {
            document.getElementById('ext-iframe').src = `chrome-extension://${extId}/popup.html`;
        }
        
        const qIcon = document.getElementById('q-it-icon');
        qIcon.addEventListener('click', () => {
            const popup = document.getElementById('popup-container');
            const isShowing = popup.style.display === 'block';
            popup.style.display = isShowing ? 'none' : 'block';
            qIcon.classList.toggle('active', !isShowing);
        });

        // Global cursor control for Puppeteer
        window.moveCursor = (x, y) => {
            const c = document.getElementById('fake-cursor');
            c.style.left = x + 'px';
            c.style.top = y + 'px';
        };
        window.clickCursor = () => {
            const c = document.getElementById('fake-cursor');
            c.classList.add('click');
            setTimeout(() => c.classList.remove('click'), 150);
        };
    </script>
</body>
</html>
